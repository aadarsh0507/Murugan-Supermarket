  backend:
    image: ghcr.io/murugananthamb/supermarket/backend:v3
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile.backend
    container_name: supermarket-backend-prod
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=${PORT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - FRONTEND_URL=${FRONTEND_URL}
      - MYSQL_URL=${MYSQL_URL}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      # - MYSQL_MOB_APP_URL=${MYSQL_MOB_APP_URL}
      # - MYSQL_GLOBAL_URL=${MYSQL_GLOBAL_URL}
    env_file:
      - .env
    volumes:
      - supermarket-item-img-volume:/super_mart/uploads
    networks:
      - supermarket-network
    # depends_on:
    #   db:
    #     condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:5000/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  frontend:
    image: ghcr.io/murugananthamb/supermarket/frontend:v3
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile.frontend
    container_name: supermarket-frontend-prod
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - supermarket-network
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

volumes:
  supermarket-item-img-volume:
    external: true
  supermarket_data:
    external: true

networks:
  supermarket-network:
    driver: bridge
