services:
  # MySQL (client DB). container_name: mysql8 for daily backup to Docker volume.
  db:
    image: mysql:8
    container_name: mysql8
    ports:
      - "3306:3306"
    environment:
      # Must match password in MYSQL_URL (backend connects as root)
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-Super_Market}
      - MYSQL_USER=${MYSQL_USER:-supermarket_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-supermarket_password}
    volumes:
      - db-data:/var/lib/mysql
      - mysql_backups:/backups   # daily 1 PM backup (BACKUP_VOLUME_PATH=/backups)
    networks:
      - supermarket-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: supermarket-phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD:-StrongRoot@123}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-StrongRoot@123}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supermarket-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

  backend:
    image: ghcr.io/murugananthamb/supermarket/backend:v3
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: supermarket-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-5000}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      # Bill timestamps + reports use this IANA zone for DATE(b.date) vs store calendar.
      - APP_TIMEZONE=${APP_TIMEZONE:-Asia/Kolkata}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      # Client DB (for app + daily backup). When running in Docker, use service name.
      - MYSQL_URL=mysql://root:${MYSQL_ROOT_PASSWORD:-StrongRoot@123}@db:3306/${MYSQL_DATABASE:-Super_Market}
      # Daily backup writes to client MySQL container's /backups (mysql_backups volume on db service)
      - BACKUP_VOLUME_PATH=/backups
      - MYSQL_BACKUP_CONTAINER=mysql8
    env_file:
      - .env
    volumes:
      - supermarket-item-img-volume:/super_mart/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - supermarket-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:5000/api/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  frontend:
    image: ghcr.io/murugananthamb/supermarket/frontend:v3
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: supermarket-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - supermarket-network
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

volumes:
  supermarket-item-img-volume:
    driver: local
  db-data:
    driver: local
  mysql_backups:   # client DB backup at 1 PM (MYSQL_URL → mysql8:/backups)
    driver: local

networks:
  supermarket-network:
    driver: bridge
